<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成都队群聊二维码</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            /* 水平垂直居中 */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            overflow: hidden; /* 防止出现滚动条 */
        }

        .qrcode-image {
            /* 核心修改：宽度设为视口宽度，高度自动等比例缩放 */
            width: 100vw;
            height: auto;
            
            /* 确保图片不变形 */
            object-fit: contain;
            
            /* 防止图片被拖动 */
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <!-- 图片名已改为 qrcode.png -->
    <img src="https://env-00jxto3ce2t2.normal.cloudstatic.cn/qrcode.jpg?expire_at=1781086421&er_sign=fcf74ba0e03d333c81f28ef756041454" alt="成都队群聊二维码" class="qrcode-image">
</body>
</html>
