<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成都队群聊二维码</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            overflow: hidden;
            position: relative;
        }

        .background-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .background-layer img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .foreground-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .qrcode-image {
            pointer-events: none;
            user-select: none;
            position: relative;
            z-index: 2;
        }

        @media screen and (max-width: 768px) {
            .qrcode-image {
                width: 100vw;
                height: auto;
                max-height: 100vh;
                mask-image: linear-gradient(
                    to bottom,
                    transparent 0%,
                    black 1%,
                    black 99%,
                    transparent 100%
                );
                -webkit-mask-image: linear-gradient(
                    to bottom,
                    transparent 0%,
                    black 1%,
                    black 99%,
                    transparent 100%
                );
            }
        }

        @media screen and (min-width: 769px) {
            .qrcode-image {
                height: 100vh;
                width: auto;
                max-width: 100vw;
                mask-image: linear-gradient(
                    to right,
                    transparent 0%,
                    black 1%,
                    black 99%,
                    transparent 100%
                );
                -webkit-mask-image: linear-gradient(
                    to right,
                    transparent 0%,
                    black 1%,
                    black 99%,
                    transparent 100%
                );
            }
        }
    </style>
</head>
<body>
    <!-- 底层图片 - 使用 jsDelivr 加速 -->
    <div class="background-layer">
        <picture>
            <source media="(max-width: 768px)" srcset="https://cdn.jsdelivr.net/gh/saintPpeak/cert-verify@main/phqrcode.jpeg">
            <source media="(min-width: 769px)" srcset="https://cdn.jsdelivr.net/gh/saintPpeak/cert-verify@main/pcqrcode.jpeg">
            <img src="https://cdn.jsdelivr.net/gh/saintPpeak/cert-verify@main/phqrcode.jpeg" alt="">
        </picture>
    </div>

    <!-- 顶层图片 - 带边缘透明渐变 -->
    <div class="foreground-wrapper">
        <picture>
            <source media="(max-width: 768px)" srcset="https://cdn.jsdelivr.net/gh/saintPpeak/cert-verify@main/phqrcode.jpeg">
            <source media="(min-width: 769px)" srcset="https://cdn.jsdelivr.net/gh/saintPpeak/cert-verify@main/pcqrcode.jpeg">
            <img src="https://cdn.jsdelivr.net/gh/saintPpeak/cert-verify@main/phqrcode.jpeg" alt="成都队群聊二维码" class="qrcode-image">
        </picture>
    </div>
</body>
</html>
