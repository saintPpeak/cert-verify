<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成都队群聊二维码</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            overflow: hidden;
        }

        img {
            display: block;
            pointer-events: none;
            user-select: none;
        }

        /* 手机端：宽度撑满，高度自适应，上下边缘拉伸 */
        @media screen and (max-width: 768px) {
            img {
                width: 100vw;
                height: 100vh;
                object-fit: cover;
                object-position: center center;
            }
        }

        /* 电脑端：高度撑满，宽度自适应，左右边缘拉伸 */
        @media screen and (min-width: 769px) {
            img {
                height: 100vh;
                width: 100vw;
                object-fit: cover;
                object-position: center center;
            }
        }
    </style>
</head>
<body>
    <img src="qrcode.jpeg" alt="成都队群聊二维码">
</body>
</html>
