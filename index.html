<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成都队群聊二维码</title>
    <style>
        /* 重置默认边距，确保视口高度准确 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            /* 使用 Flex 布局让图片完美居中 */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
        }

        .qrcode-image {
            /* 核心修改：高度设为视口高度，宽度自动等比例缩放 */
            height: 100vh;
            width: auto;
            
            /* 保持图片原有比例，防止被拉伸变形 */
            object-fit: contain;
            
            /* 可选：增加一点内边距防止图片贴边，如果不需要可删除 */
            padding: 10px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <!-- 请将 src 替换为你实际上传的图片路径 -->
    <img src="qrcode.jpg" alt="成都队群聊二维码" class="qrcode-image">
</body>
</html>
