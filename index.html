<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成都队群聊二维码</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            overflow: hidden;
        }

        .qrcode-image {
            pointer-events: none;
            user-select: none;
        }

        /* 手机端样式 */
        @media screen and (max-width: 768px) {
            .qrcode-image {
                width: 100vw;
                height: auto;
            }
        }

        /* 电脑端样式 */
        @media screen and (min-width: 769px) {
            .qrcode-image {
                height: 100vh;
                width: auto;
            }
        }
    </style>
</head>
<body>
    <!-- 使用picture元素根据设备加载不同图片 -->
    <picture>
        <!-- 手机端使用phqrcode.jpg -->
        <source media="(max-width: 768px)" srcset="phqrcode.jpg">
        <!-- 电脑端使用pcqrcode.jpg -->
        <source media="(min-width: 769px)" srcset="pcqrcode.jpg">
        <!-- 默认图片（备用） -->
        <img src="phqrcode.jpg" alt="成都队群聊二维码" class="qrcode-image">
    </picture>
</body>
</html>
